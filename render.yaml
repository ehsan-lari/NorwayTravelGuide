services:
  - type: web
    name: norway-travel-guide-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: FROST_CLIENT_ID
        sync: false          # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.12.0
